# ==========================================
# Student Grade Tracker - Configuration
# ==========================================

spring.application.name=grade-tracker

# H2 In-Memory Database (works out of the box - no install needed)
spring.datasource.url=jdbc:h2:mem:gradedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Web Console - visit http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Server
server.port=8080

# CORS
spring.web.cors.allowed-origins=http://localhost:3000
